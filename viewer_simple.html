<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maquette IGC</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
  </style>
</head>
<body>

  <model-viewer
    src="https://github.com/lazarus427/Maquette/releases/download/IGC/Maquette2.glb"
    camera-controls
    auto-rotate
    shadow-intensity="0.8"
    environment-image="neutral"
    style="width:100vw; height:100vh">
  </model-viewer>

</body>
</html>
